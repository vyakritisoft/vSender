name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Lint JavaScript source files
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Validate manifest.json
  # ──────────────────────────────────────────────────────────────────────────
  validate-manifest:
    name: 📋 Validate Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate manifest.json
        run: node scripts/validateManifest.js

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Run unit tests with coverage
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Package the extension as a distributable ZIP
  # ──────────────────────────────────────────────────────────────────────────
  package:
    name: 📦 Package Extension
    runs-on: ubuntu-latest
    needs: [ lint, validate-manifest, test ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -e "const m=require('./extension/manifest.json'); console.log(m.version);")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Build extension ZIP
        run: |
          cd extension
          zip -r ../vsender-v${{ steps.version.outputs.version }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          echo "✅ Created vsender-v${{ steps.version.outputs.version }}.zip"
          ls -lh ../vsender-v${{ steps.version.outputs.version }}.zip

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsender-v${{ steps.version.outputs.version }}
          path: vsender-v${{ steps.version.outputs.version }}.zip
          retention-days: 30
          if-no-files-found: error
