name: Release

on:
  push:
    tags:
      - 'v*.*.*'      # Triggers on tags like v1.1.4, v2.0.0

permissions:
  contents: write    # Required to create GitHub Releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Run full CI gate before releasing
  # ──────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: ✅ CI Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: node scripts/validateManifest.js

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test:coverage

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Build & publish GitHub Release with extension ZIP
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: 🚀 GitHub Release
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for changelog generation

      - name: Extract version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"          # e.g.  v1.1.4
          VERSION="${TAG#v}"                       # e.g.  1.1.4
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(node -e "const m=require('./extension/manifest.json'); console.log(m.version);")
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: manifest.json has $MANIFEST_VERSION, tag is $TAG_VERSION"
            exit 1
          fi
          echo "✅ Versions match: $MANIFEST_VERSION"

      - name: Build extension ZIP
        run: |
          cd extension
          zip -r ../vsender-${{ steps.tag.outputs.tag }}.zip . \
            --exclude "*.DS_Store" \
            --exclude "__MACOSX/*"
          echo "✅ Built vsender-${{ steps.tag.outputs.tag }}.zip"

      - name: Generate changelog from git log
        id: changelog
        run: |
          # Get the previous tag to diff against
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi

          # Write changelog to file (handles multiline in GITHUB_OUTPUT)
          {
            echo "CHANGELOG<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: vSender ${{ steps.tag.outputs.tag }}
          tag_name: ${{ steps.tag.outputs.tag }}
          body: |
            ## 🚀 vSender ${{ steps.tag.outputs.tag }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### 📦 Installation
            1. Download **vsender-${{ steps.tag.outputs.tag }}.zip** below
            2. Unzip it to a local folder
            3. Open Chrome → `chrome://extensions` → Enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ### 🔄 Minimum Chrome Version
            Chrome 116+
          files: vsender-${{ steps.tag.outputs.tag }}.zip
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
